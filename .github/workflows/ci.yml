name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} --extra dev ruff check .

      - name: Test (pytest)
        run: uv run --python ${{ matrix.python-version }} --extra dev pytest -q
